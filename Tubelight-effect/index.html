<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .tube {
      width: 300px;
      height: 20px;
      background: #ffffff;
      border-radius: 10px;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%   { box-shadow: 0 0 10px #fff, 0 0 30px #00cfff, 0 0 60px #00cfff, 0 0 100px #00cfff; opacity: 1; }
      45%  { box-shadow: 0 0 10px #fff, 0 0 30px #00cfff, 0 0 60px #00cfff, 0 0 100px #00cfff; opacity: 1; }
      50%  { box-shadow: none; opacity: 0.2; }
      55%  { box-shadow: 0 0 10px #fff, 0 0 30px #00cfff, 0 0 60px #00cfff, 0 0 100px #00cfff; opacity: 1; }
      60%  { box-shadow: none; opacity: 0.2; }
      65%  { box-shadow: 0 0 10px #fff, 0 0 30px #00cfff, 0 0 60px #00cfff, 0 0 100px #00cfff; opacity: 1; }
      100% { box-shadow: 0 0 10px #fff, 0 0 30px #00cfff, 0 0 60px #00cfff, 0 0 100px #00cfff; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="tube"></div>
</body>
</html>
