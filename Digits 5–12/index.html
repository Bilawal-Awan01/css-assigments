<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .wrap {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .digit {
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-family: monospace;
      text-shadow: 0 0 8px #fff, 0 0 20px #00cfff, 0 0 40px #00cfff;
      border: 1px solid #00cfff;
      box-shadow: 0 0 10px #00cfff;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="digit">5</span>
    <span class="digit">6</span>
    <span class="digit">7</span>
    <span class="digit">8</span>
    <span class="digit">9</span>
    <span class="digit">10</span>
    <span class="digit">11</span>
    <span class="digit">12</span>
  </div>
</body>
</html>
